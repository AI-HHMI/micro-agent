[project]
authors = [{name = "David Ackerman", email = "ackermand@janelia.hhmi.org"}]
dependencies = ["mcp>=1.0.0", "httpx>=0.27.0"]
description = "MCP servers for agentic discovery over microscopy repositories"
name = "trailhead"
requires-python = ">= 3.11"
version = "0.1.0"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["mcp_servers"]

[tool.pixi.project]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.pypi-dependencies]
trailhead = { path = ".", editable = true }

[tool.pixi.tasks]
idr = "python mcp_servers/idr_server.py"
empiar = "python mcp_servers/empiar_server.py"
microns = "python mcp_servers/microns_server.py"
bia = "python mcp_servers/bia_server.py"
openorganelle = "python mcp_servers/openorganelle_server.py"
unified = "python mcp_servers/unified_server.py"
